<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Control de Gestión - Banco Falabella</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .tab-active {
      border-bottom-width: 2px;
      border-color: #3b82f6;
      color: #1d4ed8;
      font-weight: 600;
    }
    input::-webkit-outer-spin-button,
    input::-webkit-inner-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }
    input[type=number] {
      -moz-appearance: textfield;
    }
  </style>
</head>
<body class="bg-gray-50 text-gray-800 font-sans antialiased">

  <header class="bg-white shadow-sm border-b border-gray-200">
    <div class="max-w-7xl mx-auto px-4 py-4 flex flex-col sm:flex-row justify-between items-center gap-4">
      <div class="flex items-center gap-3">
        <div class="w-8 h-8 bg-green-600 rounded flex items-center justify-center text-white font-bold tracking-tighter">BF</div>
        <div>
          <h1 class="text-xl font-bold text-gray-900">Plataforma de Control Económico</h1>
          <p class="text-xs text-gray-500">Carteras de Soluciones Financieras</p>
        </div>
      </div>
      <div class="flex items-center gap-3">
        <button onclick="loadData()" id="btn-refresh" class="px-4 py-2 bg-gray-100 hover:bg-gray-200 text-gray-700 text-sm font-medium rounded-lg transition duration-200 flex items-center gap-2">
          <span>🔄</span> Actualizar Datos
        </button>
        <button onclick="saveData()" id="btn-save" class="px-5 py-2 bg-blue-600 hover:bg-blue-700 text-white text-sm font-medium rounded-lg shadow-sm transition duration-200 flex items-center gap-2">
          <span>💾</span> Guardar Cambios
        </button>
      </div>
    </div>
  </header>

  <main class="max-w-7xl mx-auto px-4 py-8">
    
    <div id="loading-overlay" class="hidden mb-6 p-4 bg-blue-50 border border-blue-200 rounded-xl flex items-center gap-3 animate-pulse">
      <span class="text-blue-600 font-medium text-sm">Procesando información de Google Sheets de forma segura...</span>
    </div>

    <div id="toast" class="hidden mb-6 p-4 rounded-xl text-sm font-medium transition-all duration-300"></div>

    <div class="border-b border-gray-200 mb-6">
      <nav class="flex space-x-8" aria-label="Tabs">
        <button onclick="switchTab('tab-rendimiento')" id="nav-tab-rendimiento" class="tab-active py-4 px-1 text-sm font-medium border-b-2 border-transparent hover:text-gray-700 hover:border-gray-300 whitespace-nowrap transition duration-200">
          👤 Rendimiento Asesores
        </button>
        <button onclick="switchTab('tab-proyeccion')" id="nav-tab-proyeccion" class="py-4 px-1 text-sm font-medium border-b-2 border-transparent hover:text-gray-700 hover:border-gray-300 whitespace-nowrap transition duration-200">
          📈 Proyección Semanal
        </button>
        <button onclick="switchTab('tab-resumen')" id="nav-tab-resumen" class="py-4 px-1 text-sm font-medium border-b-2 border-transparent hover:text-gray-700 hover:border-gray-300 whitespace-nowrap transition duration-200">
          📋 Resumen General
        </button>
      </nav>
    </div>

    <div class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
      
      <div id="tab-rendimiento" class="tab-content block overflow-x-auto">
        <table class="min-w-full divide-y divide-gray-200 text-left text-sm">
          <thead class="bg-gray-50 text-gray-600 font-semibold uppercase tracking-wider text-xs">
            <tr>
              <th class="px-6 py-4">Asesor</th>
              <th class="px-6 py-4">Monto PDP</th>
              <th class="px-6 py-4">Calidad PDP</th>
              <th class="px-6 py-4">Pago del Mes</th>
              <th class="px-6 py-4">Objetivo</th>
              <th class="px-6 py-4 text-right">Avance Realizado</th>
            </tr>
          </thead>
          <tbody id="body-rendimiento" class="divide-y divide-gray-200 bg-white">
            </tbody>
        </table>
      </div>

      <div id="tab-proyeccion" class="tab-content hidden overflow-x-auto">
        <table class="min-w-full divide-y divide-gray-200 text-left text-sm">
          <thead class="bg-gray-50 text-gray-600 font-semibold uppercase tracking-wider text-xs">
            <tr>
              <th class="px-6 py-4">Fecha de Proyección</th>
              <th class="px-6 py-4">Monto Proyectado</th>
              <th class="px-6 py-4">Monto Pagado Recaudado</th>
            </tr>
          </thead>
          <tbody id="body-proyeccion" class="divide-y divide-gray-200 bg-white">
            </tbody>
        </table>
      </div>

      <div id="tab-resumen" class="tab-content hidden overflow-x-auto">
        <table class="min-w-full divide-y divide-gray-200 text-left text-sm">
          <thead class="bg-gray-50 text-gray-600 font-semibold uppercase tracking-wider text-xs">
            <tr>
              <th class="px-6 py-4">Métrica Financiera</th>
              <th class="px-6 py-4">Valor Reportado</th>
            </tr>
          </thead>
          <tbody id="body-resumen" class="divide-y divide-gray-200 bg-white">
            </tbody>
        </table>
      </div>

    </div>
  </main>

  <script>
    // URL de tu API
    const WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbzB8u92lLKaFp9h2ImzdC085AemC70TChShfqfnQRudXbaBuWfpSu_TvyI6-Fcvv3LR/exec';

    let localState = {
      rendimiento: [],
      proyeccion: [],
      resumen: []
    };

    window.addEventListener('DOMContentLoaded', () => {
      loadData();
    });

    function showLoading(status) {
      const overlay = document.getElementById('loading-overlay');
      if (status) overlay.classList.remove('hidden');
      else overlay.classList.add('hidden');
    }

    function showToast(message, type = 'success') {
      const toast = document.getElementById('toast');
      toast.className = `p-4 rounded-xl text-sm font-medium transition-all duration-300 block`;
      if (type === 'success') {
        toast.classList.add('bg-green-50', 'border', 'border-green-200', 'text-green-700');
      } else {
        toast.classList.add('bg-red-50', 'border', 'border-red-200', 'text-red-700');
      }
      toast.innerText = message;
      setTimeout(() => toast.classList.add('hidden'), 5000);
    }

    function switchTab(tabId) {
      document.querySelectorAll('.tab-content').forEach(el => el.classList.add('hidden'));
      document.getElementById(tabId).classList.remove('hidden');
      
      document.querySelectorAll('nav button').forEach(btn => {
        btn.classList.remove('tab-active');
        btn.classList.add('text-gray-500', 'border-transparent');
      });
      document.getElementById(`nav-${tabId}`).classList.add('tab-active');
    }

    /**
     * LECTURA DE DATOS: Uso de text/plain para evadir bloqueo CORS
     */
    function loadData() {
      showLoading(true);
      fetch(WEB_APP_URL, {
        method: 'POST',
        headers: {
          'Content-Type': 'text/plain;charset=utf-8'
        },
        body: JSON.stringify({ action: 'read' })
      })
      .then(response => {
        if (!response.ok) throw new Error('Error en el servidor');
        return response.json();
      })
      .then(res => {
        if (res.success) {
          const data = res.data;
          localState.rendimiento = data.rendimiento || [];
          localState.proyeccion = data.proyeccion || [];
          localState.resumen = data.resumen || [];
          
          renderRendimiento();
          renderProyeccion();
          renderResumen();
        } else {
          showToast(res.error || 'Error leyendo base de datos', 'error');
        }
        showLoading(false);
      })
      .catch(err => {
        showLoading(false);
        showToast('Error de conexión. Si abriste este archivo con doble clic (file://), necesitas subirlo a un hosting (ej. Vercel) o usar un servidor local.', 'error');
      });
    }

    function renderRendimiento() {
      const tbody = document.getElementById('body-rendimiento');
      tbody.innerHTML = '';
      
      if(localState.rendimiento.length === 0) {
        tbody.innerHTML = `<tr><td colspan="6" class="px-6 py-4 text-center text-gray-400">Sin datos registrados en Rendimiento Asesores.</td></tr>`;
        return;
      }

      localState.rendimiento.forEach((row, idx) => {
        const pagoMes = parseFloat(row["Pago del Mes"]) || 0;
        const objetivo = parseFloat(row["Objetivo"]) || 0;
        const avancePercent = objetivo > 0 ? ((pagoMes / objetivo) * 100).toFixed(1) : '0.0';
        
        const tr = document.createElement('tr');
        tr.className = "hover:bg-gray-50 transition duration-150";
        tr.innerHTML = `
          <td class="px-6 py-4 font-medium text-gray-900">${row["Asesor"] || ''}</td>
          <td class="px-6 py-4">
            <input type="text" value="${row["Monto PDP"] || ''}" onchange="updateLocalValue('rendimiento', ${idx}, 'Monto PDP', this.value)" class="bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 block w-full p-2" />
          </td>
          <td class="px-6 py-4">
            <input type="number" step="0.01" value="${row["Calidad PDP"] || 0}" onchange="updateLocalValue('rendimiento', ${idx}, 'Calidad PDP', this.value)" class="bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 block w-32 p-2" />
          </td>
          <td class="px-6 py-4">
            <input type="number" step="0.01" value="${pagoMes}" onchange="updateLocalValue('rendimiento', ${idx}, 'Pago del Mes', this.value); renderRendimiento();" class="bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 block w-40 p-2" />
          </td>
          <td class="px-6 py-4">
            <input type="number" step="0.01" value="${objetivo}" onchange="updateLocalValue('rendimiento', ${idx}, 'Objetivo', this.value); renderRendimiento();" class="bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 block w-40 p-2" />
          </td>
          <td class="px-6 py-4 text-right font-semibold text-gray-700">${avancePercent}%</td>
        `;
        tbody.appendChild(tr);
      });
    }

    function renderProyeccion() {
      const tbody = document.getElementById('body-proyeccion');
      tbody.innerHTML = '';
      
      if(localState.proyeccion.length === 0) {
        tbody.innerHTML = `<tr><td colspan="3" class="px-6 py-4 text-center text-gray-400">Sin datos de proyecciones semanales.</td></tr>`;
        return;
      }

      localState.proyeccion.forEach((row, idx) => {
        let fechaFormateada = row["Fecha"];
        if (row["Fecha"] instanceof Date || !isNaN(Date.parse(row["Fecha"]))) {
          const d = new Date(row["Fecha"]);
          if(!isNaN(d.getTime())) {
             fechaFormateada = d.toLocaleDateString('es-PE');
          }
        }

        const tr = document.createElement('tr');
        tr.className = "hover:bg-gray-50 transition duration-150";
        tr.innerHTML = `
          <td class="px-6 py-4 text-gray-600 font-medium">${fechaFormateada || ''}</td>
          <td class="px-6 py-4">
            <input type="number" step="0.01" value="${row["Monto Proyectado"] || 0}" onchange="updateLocalValue('proyeccion', ${idx}, 'Monto Proyectado', this.value)" class="bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 block w-48 p-2" />
          </td>
          <td class="px-6 py-4">
            <input type="number" step="0.01" value="${row["Monto Pagado"] || 0}" onchange="updateLocalValue('proyeccion', ${idx}, 'Monto Pagado', this.value)" class="bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 block w-48 p-2" />
          </td>
        `;
        tbody.appendChild(tr);
      });
    }

    function renderResumen() {
      const tbody = document.getElementById('body-resumen');
      tbody.innerHTML = '';
      
      if(localState.resumen.length === 0) {
        tbody.innerHTML = `<tr><td colspan="2" class="px-6 py-4 text-center text-gray-400">Sin métricas de resumen global.</td></tr>`;
        return;
      }

      localState.resumen.forEach((row, idx) => {
        const tr = document.createElement('tr');
        tr.className = "hover:bg-gray-50 transition duration-150";
        tr.innerHTML = `
          <td class="px-6 py-4 text-gray-700 font-medium">${row["Métrica"] || ''}</td>
          <td class="px-6 py-4">
            <input type="text" value="${row["Valor"] || ''}" onchange="updateLocalValue('resumen', ${idx}, 'Valor', this.value)" class="bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 block w-64 p-2" />
          </td>
        `;
        tbody.appendChild(tr);
      });
    }

    function updateLocalValue(category, index, key, value) {
      localState[category][index][key] = value;
    }

    /**
     * GUARDADO DE DATOS: Uso de text/plain para evadir bloqueo CORS
     */
    function saveData() {
      showLoading(true);
      fetch(WEB_APP_URL, {
        method: 'POST',
        headers: {
          'Content-Type': 'text/plain;charset=utf-8'
        },
        body: JSON.stringify({ action: 'save', payload: localState })
      })
      .then(response => response.json())
      .then(res => {
        showLoading(false);
        if (res.success) {
          showToast('¡Información sincronizada y guardada con éxito en Google Sheets!');
          loadData();
        } else {
          showToast('Hubo un inconveniente al guardar: ' + res.error, 'error');
        }
      })
      .catch(err => {
        showLoading(false);
        showToast('Error al intentar salvar. Asegúrate de no abrir el archivo directamente con doble clic.', 'error');
      });
    }
  </script>
</body>
</html>
